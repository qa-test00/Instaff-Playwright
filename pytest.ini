[pytest]
addopts = -v --tb=short
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: fast, critical-path tests
    regression: full regression suite
    admin: tests that require admin credentials
    employee: tests that require employee credentials
# Uncomment to capture a screenshot on every failure:
# addopts = -v --tb=short --screenshot=only-on-failure --output=test-results
